name: Medical workspace CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rs -> target
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Build CLI
        run: cargo build -p codex-cli
      - name: Check medical app-server API
        run: cargo check -p codex-app-server
      - name: Test app-server protocol and generated schemas
        run: cargo test -p codex-app-server-protocol --lib
      - name: Test packet-authorized model tool
        run: cargo test -p codex-core workspace_context --lib
      - name: Test medical dashboard
        run: cargo test -p codex-tui workspace_dashboard --lib
      - name: Test medical app flows
        run: cargo test -p codex-tui medical_workspace --lib
      - name: Test context-packet lifecycle
        run: cargo test -p codex-tui workspace_context_packet --lib
      - name: Test workspace state
        run: cargo test -p codex-state workspace --lib

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_VERSION: 8.30.1
