name: Bug report
description: Report a reproducible defect using synthetic data only.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Never include PHI, credentials, database files, or sensitive screenshots."
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Include terminal size, commands, keys, and fixture setup.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Revision and environment
      description: Commit SHA, OS, terminal, and checks already tried.
    validations:
      required: true
